<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arovia ERP Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <h2>Arovia ERP</h2>

        <ul>

            <li class="active">🏠 Dashboard</li>

            <li>👥 Employees</li>

            <li>👨‍⚕️ Doctors</li>

            <li>🏥 Chemists</li>

            <li>💊 Products</li>

            <li>💰 Expenses</li>

            <li>📈 Reports</li>

            <li>⚙️ Settings</li>

        </ul>

    </aside>

    <main class="main-content">

        <header>

            <h1>Dashboard</h1>

            <div class="profile">
                Administrator
            </div>

        </header>

        <section class="cards">

            <div class="card">
                <h3>Employees</h3>
                <h2>18</h2>
            </div>

            <div class="card">
                <h3>Doctors</h3>
                <h2>124</h2>
            </div>

            <div class="card">
                <h3>Products</h3>
                <h2>46</h2>
            </div>

            <div class="card">
                <h3>Sales</h3>
                <h2>₹12.5L</h2>
            </div>

        </section>

        <section class="chart-box">

            <h2>Sales Analytics</h2>

            <div class="chart-placeholder">

                📈 Chart Coming Soon

            </div>

        </section>

    </main>

</div>

</body>
</html>
